spring:
  application:
    name: 12306-ragent
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/agent12306?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always

assistant:
  model: qwen-max
  api-key: ${DASHSCOPE_API_KEY:}
  system-prompt: 你是12306智能客服助手。遇到票务、车站、经停站相关问题时，优先调用MCP工具核实信息，再用中文给出简洁、准确的回答。
  max-iters: 5
  mcp:
    enabled: true
    name: ticketing-mcp
    command: java
    jar-path: ../12306-mcp/target/12306-mcp-0.0.1-SNAPSHOT.jar
    timeout-seconds: 30
    initialization-timeout-seconds: 30
  memory:
    enabled: true
    window-size: 6
    summary-batch-size: 4
    recall-top-k: 3
    recall-score-threshold: 0.6
    ttl-hours: 24
    milvus:
      enabled: false
      uri: ${MILVUS_URI:http://127.0.0.1:19530}
      collection-name: assistant_memory
      dimensions: 1024
      token: ${MILVUS_TOKEN:}
  knowledge:
    enabled: true
    chunk-size: 800
    chunk-overlap: 120
    recall-top-k: 4
    recall-score-threshold: 0.45
    storage:
      endpoint: ${RUSTFS_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${RUSTFS_ACCESS_KEY:rustfsadmin}
      secret-key: ${RUSTFS_SECRET_KEY:rustfsadmin}
      bucket-name: ${RUSTFS_BUCKET:agent12306-knowledge}
      region: ${RUSTFS_REGION:us-east-1}
    milvus:
      enabled: true
      uri: ${MILVUS_URI:http://127.0.0.1:19530}
      collection-name: assistant_knowledge
      dimensions: 1024
      token: ${MILVUS_TOKEN:}

sso:
  server-url: ${SSO_SERVER_URL:http://localhost:9006}
  client: ${SSO_CLIENT:agent12306-client}
  callback-url: ${SSO_CALLBACK_URL:http://localhost:8080/sso/callback}
