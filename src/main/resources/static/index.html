<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12306 智能助手 - 意图识别测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
        }
        .card-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .card-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .card-body {
            padding: 30px;
        }
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 20px;
            font-size: 14px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
        }
        .status-dot.active {
            background: #4caf50;
        }
        .status-dot.error {
            background: #f44336;
        }
        .chat-container {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .message.user {
            align-items: flex-end;
        }
        .message.assistant {
            align-items: flex-start;
        }
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .intent-result {
            background: #f0f7ff;
            border: 1px solid #cce5ff;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .intent-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 6px;
            margin-bottom: 4px;
        }
        .intent-tag.kb {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .intent-tag.mcp {
            background: #fff3e0;
            color: #e65100;
        }
        .intent-tag.system {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        .input-area {
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        .input-area button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .quick-btn {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .section-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }
        .loading-dots {
            display: flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .debug-panel {
            background: #fffde7;
            border: 1px solid #fff59d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .debug-panel h3 {
            font-size: 14px;
            color: #f57c00;
            margin-bottom: 12px;
        }
        .debug-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .debug-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .debug-item label {
            color: #666;
        }
        .debug-item span {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>🚄 12306 智能助手</h1>
                <p>基于树形意图识别的智能票务问答系统</p>
            </div>
            <div class="card-body">
                <!-- 状态栏 -->
                <div class="status-bar">
                    <div class="status-item">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">检测中...</span>
                    </div>
                    <div class="status-item">
                        <span>调试模式:</span>
                        <span id="debugModeStatus">检测中...</span>
                    </div>
                </div>

                <!-- 调试面板 -->
                <div class="debug-panel">
                    <h3>🔧 系统信息</h3>
                    <div class="debug-info">
                        <div class="debug-item">
                            <label>当前用户:</label>
                            <span id="currentUser">-</span>
                        </div>
                        <div class="debug-item">
                            <label>会话ID:</label>
                            <span id="sessionId">-</span>
                        </div>
                        <div class="debug-item">
                            <label>API状态:</label>
                            <span id="apiStatus">-</span>
                        </div>
                    </div>
                </div>

                <!-- 快捷问题 -->
                <div class="section-title">快捷测试问题</div>
                <div class="quick-questions">
                    <button class="quick-btn" onclick="sendQuestion('查一下明天北京到上海的高铁票')">北京→上海 余票查询</button>
                    <button class="quick-btn" onclick="sendQuestion('G1234次列车经过哪些站')">车次经停站查询</button>
                    <button class="quick-btn" onclick="sendQuestion('退票怎么收费')">退票规则</button>
                    <button class="quick-btn" onclick="sendQuestion('候补购票是什么意思')">候补购票规则</button>
                    <button class="quick-btn" onclick="sendQuestion('学生票怎么购买')">学生票规则</button>
                    <button class="quick-btn" onclick="sendQuestion('你好，你能做什么')">系统问候</button>
                    <button class="quick-btn" onclick="sendQuestion('怎么投诉列车员')">投诉建议</button>
                    <button class="quick-btn" onclick="sendQuestion('积分怎么兑换')">积分规则</button>
                </div>

                <!-- 聊天区域 -->
                <div class="chat-container" id="chatContainer">
                    <div class="message assistant">
                        <div class="message-content">👋 您好！我是12306智能助手，我可以帮您：

• 查询车票余票
• 查询车次经停站
• 解答退票、改签、候补等规则问题
• 查询订单信息

请直接描述您的需求，或点击上方快捷问题进行测试~</div>
                        <div class="message-time" id="welcomeTime"></div>
                    </div>
                </div>

                <!-- 输入区域 -->
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
                    <button id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = localStorage.getItem('sessionId') || generateSessionId();
        localStorage.setItem('sessionId', sessionId);
        document.getElementById('sessionId').textContent = sessionId.substring(0, 8) + '...';

        // 生成会话ID
        function generateSessionId() {
            return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // 页面加载时检查状态
        window.onload = async function() {
            await checkStatus();
        };

        // 检查系统状态
        async function checkStatus() {
            try {
                // 检查当前用户状态
                const meResponse = await fetch('/api/me');
                if (meResponse.ok) {
                    const meData = await meResponse.json();
                    document.getElementById('currentUser').textContent = meData.realName || meData.username || '未知';
                    document.getElementById('debugModeStatus').textContent = meData.debugMode ? '已开启' : '未开启';
                    document.getElementById('statusDot').classList.add('active');
                    document.getElementById('statusText').textContent = '已连接';
                } else if (meResponse.status === 401) {
                    // 尝试调试登录
                    const debugResponse = await fetch('/debug/login');
                    if (debugResponse.ok) {
                        const debugData = await debugResponse.json();
                        if (debugData.debugMode) {
                            document.getElementById('currentUser').textContent = debugData.realName;
                            document.getElementById('debugModeStatus').textContent = '已开启（自动）';
                            document.getElementById('statusDot').classList.add('active');
                            document.getElementById('statusText').textContent = '已连接（调试模式）';
                        } else {
                            throw new Error('需要登录');
                        }
                    } else {
                        throw new Error('调试登录失败');
                    }
                }
            } catch (error) {
                console.error('Status check failed:', error);
                document.getElementById('statusDot').classList.add('error');
                document.getElementById('statusText').textContent = '连接失败';
                document.getElementById('apiStatus').textContent = '请启动后端服务';
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            // 如果传入的是预定义问题，使用该问题
            sendQuestion(message);
            input.value = '';
        }

        // 发送问题
        async function sendQuestion(question) {
            addMessage(question, 'user');
            setLoading(true);

            try {
                const response = await fetch('/api/assistant/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: question
                    })
                });

                if (!response.ok) {
                    throw new Error('请求失败: ' + response.status);
                }

                const data = await response.json();
                addMessage(data.answer || '抱歉，我没有获取到有效的回答。', 'assistant');

            } catch (error) {
                console.error('Request failed:', error);
                addMessage('发送失败: ' + error.message + '\n\n请确保后端服务已启动。', 'assistant');
            } finally {
                setLoading(false);
            }
        }

        // 添加消息到聊天区域
        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            // 检查是否包含结构化信息
            let displayContent = content;
            let intentInfo = null;

            // 尝试解析意图标签
            const kbMatch = content.match(/【意图类型】KB（知识库检索）/);
            const mcpMatch = content.match(/【意图类型】MCP（外部工具调用）/);
            const systemMatch = content.match(/【意图类型】SYSTEM（系统交互）/);

            if (kbMatch || mcpMatch || systemMatch) {
                intentInfo = [];
                if (kbMatch) intentInfo.push({ type: 'KB', label: '知识库检索', class: 'kb' });
                if (mcpMatch) intentInfo.push({ type: 'MCP', label: '外部工具调用', class: 'mcp' });
                if (systemMatch) intentInfo.push({ type: 'SYSTEM', label: '系统交互', class: 'system' });
            }

            messageDiv.innerHTML = `
                <div class="message-content">${escapeHtml(displayContent)}</div>
                ${intentInfo ? `
                    <div class="intent-result">
                        <span class="section-title" style="margin:0 0 6px 0">识别到的意图：</span>
                        ${intentInfo.map(i => `<span class="intent-tag ${i.class}">${i.label} (${i.type})</span>`).join('')}
                    </div>
                ` : ''}
                <div class="message-time">${time}</div>
            `;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 设置加载状态
        function setLoading(loading) {
            const btn = document.getElementById('sendBtn');
            const input = document.getElementById('messageInput');

            if (loading) {
                btn.disabled = true;
                btn.textContent = '思考中...';
                input.disabled = true;

                // 添加加载消息
                const container = document.getElementById('chatContainer');
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'message assistant';
                loadingDiv.id = 'loadingMessage';
                loadingDiv.innerHTML = `
                    <div class="message-content">
                        <div class="loading">
                            <span>正在分析问题</span>
                            <div class="loading-dots">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(loadingDiv);
                container.scrollTop = container.scrollHeight;
            } else {
                btn.disabled = false;
                btn.textContent = '发送';
                input.disabled = false;
                input.focus();

                // 移除加载消息
                const loadingMsg = document.getElementById('loadingMessage');
                if (loadingMsg) loadingMsg.remove();
            }
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
